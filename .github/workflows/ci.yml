name: CI

on:
  push:
    branches:
      - main
      - dev
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "release/**"
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

env:
  # Force JavaScript actions to run on Node 24 (per brettdavies repo policy)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0
        with:
          globs: |
            **/*.md
            #node_modules

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run ShellCheck (bundle scripts — ship to consumers)
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        env:
          # style severity surfaces all suggestions; CI fails on error+warning by default
          SHELLCHECK_OPTS: "--severity=style"
        with:
          scandir: ./bundle/scripts
          additional_files: bundle/scripts/checks/_helpers.sh
      - name: Run ShellCheck (producer scripts)
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        env:
          SHELLCHECK_OPTS: "--severity=style"
        with:
          scandir: ./scripts
